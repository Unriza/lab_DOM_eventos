<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <!-- CSS de Bootstrap 5 -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="#">🛒 Mi Tienda</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Hogar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Características</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Cambiar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal (Rejilla de 2 columnas: Productos y Carrito) -->
    <main class="container my-5">
        <div class="row g-4">
            
            <!-- Columna de Productos (Ocupa 8 de 12 columnas en pantallas grandes) -->
            <section class="col-lg-8">
                <h2 class="mb-4 fw-semibold text-secondary">Nuestros Productos</h2>
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    
                    <!-- Producto 1 -->
                    <div class="col">
                        <article class="card h-100 shadow-sm border-0">
                            <img src="./portatil.jpg" class="card-img-top p-3 bg-white object-fit-contain" alt="Imagen de portatil" style="height: 200px;">
                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="card-title fw-bold">Portátil de Estudio</h5>
                                    <p class="card-text text-success fs-5 fw-semibold">$500.000 COP</p>
                                </div>
                                <button class="btn btn-primary w-100 mt-3" onclick="agregarAlCarrito('Portátil de Estudio', 500000)">
                                    Agregar al carrito
                                </button>
                            </div>
                        </article>
                    </div>

                    <!-- Producto 2 -->
                    <div class="col">
                        <article class="card h-100 shadow-sm border-0">
                            <img src="./tableta.jpg" class="card-img-top p-3 bg-white object-fit-contain" alt="Imagen de tableta" style="height: 200px;">
                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="card-title fw-bold">Tableta Digital</h5>
                                    <p class="card-text text-success fs-5 fw-semibold">$300.000 COP</p>
                                </div>
                                <button class="btn btn-primary w-100 mt-3" onclick="agregarAlCarrito('Tableta Digital', 300000)">
                                    Agregar al carrito
                                </button>
                            </div>
                        </article>
                    </div>

                    <!-- Producto 3 -->
                    <div class="col">
                        <article class="card h-100 shadow-sm border-0">
                            <img src="./tel.jpg" class="card-img-top p-3 bg-white object-fit-contain" alt="Imagen telefono celular" style="height: 200px;">
                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="card-title fw-bold">Teléfono Celular</h5>
                                    <p class="card-text text-success fs-5 fw-semibold">$200.000 COP</p>
                                </div>
                                <button class="btn btn-primary w-100 mt-3" onclick="agregarAlCarrito('Teléfono Celular', 200000)">
                                    Agregar al carrito
                                </button>
                            </div>
                        </article>
                    </div>

                </div>
            </section>

            <!-- Columna del Carrito (Ocupa 4 de 12 columnas, fija a la derecha) -->
            <section class="col-lg-4">
                <div class="card shadow-sm border-0 position-sticky" style="top: 20px;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4 fw-bold text-dark border-bottom pb-2">🛒 Tu Carrito</h3>
                        
                        <!-- Lista dinámica -->
                        <div id="lista-carrito" class="mb-4 text-muted" style="min-height: 100px;">
                            <p class="text-center my-4">El carrito está vacío</p>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center border-top pt-3 mb-4">
                            <span class="fs-5 fw-bold text-secondary">Total:</span>
                            <span id="total-carrito" class="fs-4 fw-extrabold text-primary">$0 COP</span>
                        </div>
                        
                        <button class="btn btn-success btn-lg w-100 fw-bold shadow-sm" onclick="procesarCompra()">
                            Finalizar Compra
                        </button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- JavaScript de Bootstrap y lógica del carrito -->
    <script src="https://jsdelivr.net"></script>
    <script>
        let carrito = [];
        let total = 0;

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            total += precio;
            actualizarCarrito();
        }

        function actualizarCarrito() {
            let lista = document.getElementById('lista-carrito');
            if (carrito.length === 0) {
                lista.innerHTML = '<p class="text-center my-4">El carrito está vacío</p>';
            } else {
                lista.innerHTML = '<ul class="list-group list-group-flush">';
                carrito.forEach((item, index) => {
                    lista.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent px-0 py-2">
                            <span>${item.nombre}</span>
                            <span class="badge bg-secondary rounded-pill">$${item.precio.toLocaleString()} COP</span>
                        </li>`;
                });
                lista.innerHTML += '</ul>';
            }
            document.getElementById('total-carrito').innerText = `$${total.toLocaleString()} COP`;
        }

        function procesarCompra() {
            if (carrito.length === 0) {
                alert("El carrito está vacío.");
            } else {
                alert(`¡Compra finalizada con éxito por un total de $${total.toLocaleString()} COP!`);
                carrito = [];
                total = 0;
                actualizarCarrito();
            }
        }
    </script>
</body>
</html>
